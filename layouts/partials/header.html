<header class="site-header">
  <div class="header-inner">
    <a href="/" class="site-logo">
      <!-- Replace with your logo: <img src="/images/logo.svg" alt="Irondequoit Directory"> -->
      <span class="logo-text">Irondequoit<span class="logo-accent">Directory</span></span>
    </a>
    <button class="mobile-menu-toggle" aria-label="Toggle menu" onclick="document.body.classList.toggle('menu-open')">
      <span></span><span></span><span></span>
    </button>
    <nav class="main-nav">
      {{ range .Site.Menus.main }}
        <a href="{{ .URL }}" class="nav-link">{{ .Name }}</a>
      {{ end }}
    </nav>
  </div>
</header>
