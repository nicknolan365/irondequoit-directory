restaurants:
  name: "Restaurants"
  icon: "🍽️"
  description: >
    Irondequoit punches above its weight on food. You've got Rochester
    institutions like Abbott's and Bill Gray's, real-deal Polish and Mexican
    places tucked into neighborhoods most people drive past, and a growing
    coffee and bakery scene along Titus. This is where you'll find your next favorite spot!
  subcategories:
    - "Sit-Down Dining"
    - "Pizza"
    - "Coffee & Bakeries"
    - "Fast Food & Takeout"
    - "Bars & Pubs"
    - "Dessert"

home-services:
  name: "Home Services"
  icon: "🏠"
  description: >
    Most houses in Irondequoit have some age on them, and eventually something
    breaks. When that happens you want someone local who picks up the phone
    and shows up when they say they will. Find your local handyman, house cleaner, or plumber.
  subcategories:
    - "Plumbing"
    - "Electrical"
    - "HVAC"
    - "Landscaping & Lawn Care"
    - "Cleaning"
    - "Roofing & Exteriors"
    - "General Contractors"
    - "Appliance Repair"

shopping:
  name: "Shopping"
  icon: "🛍️"
  description: >
    Wegmans is here. So is House of Guitars, Titus Mower, and a handful of
    family-run shops that have been in Irondequoit for generations. Some of
    it you can't find anywhere else.
  subcategories:
    - "Grocery & Convenience"
    - "Clothing & Accessories"
    - "Gift & Specialty"
    - "Hardware & Home"
    - "Pet Supplies"

health--wellness:
  name: "Health & Wellness"
  icon: "💚"
  description: >
    Gyms, trainers, nutritionists, and wellness spots around town. Most of
    it's along East Ridge, with a few independents tucked into the side
    streets. No need to drive into the city for a good workout.
  subcategories:
    - "Medical & Doctors"
    - "Dental"
    - "Chiropractic & Physical Therapy"
    - "Mental Health"
    - "Pharmacy"
    - "Vision Care"
    - "Fitness & Gyms"

salons--barbers:
  name: "Salons & Barbers"
  icon: "💈"
  description: >
    Cuts, color, nails, and skincare — mostly along East Ridge and Titus.
    Small shops where the person holding the scissors remembers your name and
    what you said last time about your sister's wedding.
  subcategories:
    - "Hair Salons"
    - "Barber Shops"
    - "Nails & Spa"

professional-services:
  name: "Professional Services"
  icon: "💼"
  description: >
    The kind of help everyone needs eventually — a tailor before a wedding,
    someone to do your taxes in April, a realtor when it's time to move. Most
    of these are quiet operations that run on word of mouth.
  subcategories:
    - "Tax & Accounting"
    - "Legal"
    - "Insurance"
    - "Real Estate"
    - "Financial Planning"
    - "Laundry & Dry Cleaning"
    - "Marketing"

auto--repairs:
  name: "Auto & Repairs"
  icon: "🔧"
  description: >
    Independent shops, mostly. A few have been on East Ridge or Culver for
    decades. The kind of places that tell you what actually needs
    fixing and what can wait another six months.
  subcategories:
    - "Auto Repair"
    - "Body Shops"
    - "Tire & Quick Service"
    - "Car Wash"
    - "Dealerships"

parks--outdoor:
  name: "Parks & Outdoor"
  icon: "🌲"
  description: >
    Lake Ontario on one side, Irondequoit Bay on the other, and Durand Eastman
    Park in the middle. For a town this size, there's more shoreline, trail,
    and open water than most people outside Rochester realize.
  subcategories:
    - "Parks"
    - "Trails & Nature"
    - "Sports Fields"
    - "Waterfront"

activities:
  name: "Activities"
  icon: "🎭"
  description: >
    The oldest mini golf course in America is here — really. Plus bowling,
    karate, a neighborhood art gallery, and the community center. Not a huge
    list, but there's more to do in town than people give it credit for.
  subcategories:
    - "Arts & Culture"
    - "Entertainment & Events"
    - "Youth & Family"
    - "Community Organizations"
