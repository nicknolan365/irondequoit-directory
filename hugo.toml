baseURL = "https://irondequoitdirectory.com/"
languageCode = "en-us"
title = "Irondequoit Directory"
description = "Your guide to local businesses and services in Irondequoit, NY"

[taxonomies]
  category = "categories"
  subcategory = "subcategories"

[params]
  tagline = "Discover Irondequoit"
  subtitle = "Your guide to local businesses, services, and things to do in Irondequoit, NY."
  phone_cta = true
  stripe_url = "https://buy.stripe.com/14A6oG48J0YcgZG4289IQ0y"  # Replace with your Stripe payment link

[menu]
  [[menu.main]]
    name = "Restaurants"
    url = "/categories/restaurants/"
    weight = 1
  [[menu.main]]
    name = "Home Services"
    url = "/categories/home-services/"
    weight = 2
  [[menu.main]]
    name = "Activities"
    url = "/categories/activities/"
    weight = 3
  [[menu.main]]
    name = "About"
    url = "/about/"
    weight = 4
  [[menu.main]]
    name = "Contact"
    url = "/contact/"
    weight = 5

[outputFormats.SearchIndex]
  baseName = "search-index"
  mediaType = "application/json"
  isPlainText = true

[outputs]
  home = ["HTML", "SearchIndex"]

[markup.goldmark.renderer]
  unsafe = true
