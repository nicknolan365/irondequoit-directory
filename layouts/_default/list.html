{{ define "main" }}
<section class="page-header">
  <div class="page-header-inner">
    <h1 class="page-title">{{ .Title }}</h1>
  </div>
</section>
<section class="section">
  <div class="section-inner">
    {{ .Content }}
    {{ range .Pages }}
      <div style="margin-bottom: 16px;">
        <a href="{{ .Permalink }}">{{ .Title }}</a>
      </div>
    {{ end }}
  </div>
</section>
{{ end }}
